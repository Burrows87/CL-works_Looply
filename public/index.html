<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looply - Organizza il tuo weekend</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285F4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Looply">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;">
        <h1 style="font-size: 3.5rem; margin: 0; color: var(--primary-color); font-weight: 800;">Looply</h1>
        <p style="color: #666; margin-bottom: 40px;">I tuoi amici sono liberi quando lo sei tu.</p>
        
        <div class="login-legal-box">
            <label class="legal-label">
                <input type="checkbox" id="check-terms">
                Accetto i <a href="terms.html" target="_blank" class="legal-link">Termini</a>
            </label>
            <label class="legal-label">
                <input type="checkbox" id="check-privacy">
                Accetto la <a href="privacy.html" target="_blank" class="legal-link">Privacy</a>
            </label>
        </div>

        <button id="btn-google-login" style="width:100%; max-width:320px; padding:16px; background:white; border:1px solid #ddd; border-radius:15px; display:flex; align-items:center; justify-content:center; gap:12px; font-weight:bold; cursor:pointer;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Accedi con Google
        </button>
    </div>

    <div id="registration-screen" class="screen" style="display:none; padding:40px 20px; text-align:center;">
        <h2>Crea il tuo profilo</h2>
        <input type="text" id="reg-name" placeholder="Il tuo nome">
        <input type="tel" id="reg-phone" placeholder="Cellulare (per WhatsApp)">
        <p style="font-weight:bold;">Scegli 3 giorni preferiti:</p>
        <div id="reg-days-selection" class="days-grid-container">
            <button type="button" class="reg-day-btn" data-day="Lunedì">Lun</button>
            <button type="button" class="reg-day-btn" data-day="Martedì">Mar</button>
            <button type="button" class="reg-day-btn" data-day="Mercoledì">Mer</button>
            <button type="button" class="reg-day-btn" data-day="Giovedì">Gio</button>
            <button type="button" class="reg-day-btn" data-day="Venerdì">Ven</button>
            <button type="button" class="reg-day-btn" data-day="Sabato">Sab</button>
            <button type="button" class="reg-day-btn" data-day="Domenica">Dom</button>
        </div>
        <button id="btn-save-profile" style="width:100%; max-width:320px; padding:18px; background:var(--primary-color); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer; margin-top:20px;">SALVA E INIZIA</button>
    </div>

    <div id="dashboard-screen" class="screen" style="display:none; padding:20px;">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div><span style="color:#888;">Bentornato,</span><h2 id="user-display-name" style="margin:0;">Utente</h2></div>
            <button id="btn-open-settings" style="background:white; border:1px solid #eee; width: 45px; height: 45px; border-radius: 12px; cursor:pointer;">⚙️</button>
        </header>

        <button id="btn-collega-amici" style="background:#25D366; color:white; padding:14px; border-radius:15px; border:none; margin-bottom:25px; width:100%; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow: 0 4px 12px rgba(37,211,102,0.2);">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20"> COLLEGA I TUOI 5 AMICI
        </button>

        <div id="settings-panel" style="display:none; position:fixed; top:85px; right:20px; background:white; padding:20px; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.15); z-index:1001; width: 260px;">
            <p style="font-weight:bold; margin-top:0;">I tuoi 3 giorni</p>
            <div id="settings-days-selection" class="days-grid-container">
                <button type="button" class="set-day-btn" data-day="Lunedì">Lun</button>
                <button type="button" class="set-day-btn" data-day="Martedì">Mar</button>
                <button type="button" class="set-day-btn" data-day="Mercoledì">Mer</button>
                <button type="button" class="set-day-btn" data-day="Giovedì">Gio</button>
                <button type="button" class="set-day-btn" data-day="Venerdì">Ven</button>
                <button type="button" class="set-day-btn" data-day="Sabato">Sab</button>
                <button type="button" class="set-day-btn" data-day="Domenica">Dom</button>
            </div>

            <p style="font-weight:bold;">Colore Tema</p>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div class="color-dot" data-color="#4285F4" style="background: #4285F4;"></div>
                <div class="color-dot" data-color="#EA4335" style="background: #EA4335;"></div>
                <div class="color-dot" data-color="#FBBC05" style="background: #FBBC05;"></div>
                <div class="color-dot" data-color="#34A853" style="background: #34A853;"></div>
                <div class="color-dot" data-color="#8E44AD" style="background: #8E44AD;"></div>
            </div>

            <button id="btn-logout" style="width:100%; color:red; background:none; border:none; cursor:pointer; font-weight:bold; padding-top:10px; border-top:1px solid #eee;">Esci</button>
        </div>

        <div class="availability-container" id="availability-list">
            <div class="day-group"><button class="day-toggle" id="btn-Lunedì">Lunedì</button><div class="time-slots" id="slots-Lunedì"><button class="slot-btn" data-day="Lunedì">Mattina</button><button class="slot-btn" data-day="Lunedì">Pomeriggio</button><button class="slot-btn" data-day="Lunedì">Sera</button></div></div>
            <div class="day-group"><button class="day-toggle" id="btn-Martedì">Martedì</button><div class="time-slots" id="slots-Martedì"><button class="slot-btn" data-day="Martedì">Mattina</button><button class="slot-btn" data-day="Martedì">Pomeriggio</button><button class="slot-btn" data-day="Martedì">Sera</button></div></div>
            <div class="day-group"><button class="day-toggle" id="btn-Mercoledì">Mercoledì</button><div class="time-slots" id="slots-Mercoledì"><button class="slot-btn" data-day="Mercoledì">Mattina</button><button class="slot-btn" data-day="Mercoledì">Pomeriggio</button><button class="slot-btn" data-day="Mercoledì">Sera</button></div></div>
            <div class="day-group"><button class="day-toggle" id="btn-Giovedì">Giovedì</button><div class="time-slots" id="slots-Giovedì"><button class="slot-btn" data-day="Giovedì">Mattina</button><button class="slot-btn" data-day="Giovedì">Pomeriggio</button><button class="slot-btn" data-day="Giovedì">Sera</button></div></div>
            <div class="day-group"><button class="day-toggle" id="btn-Venerdì">Venerdì</button><div class="time-slots" id="slots-Venerdì"><button class="slot-btn" data-day="Venerdì">Mattina</button><button class="slot-btn" data-day="Venerdì">Pomeriggio</button><button class="slot-btn" data-day="Venerdì">Sera</button></div></div>
            <div class="day-group"><button class="day-toggle" id="btn-Sabato">Sabato</button><div class="time-slots" id="slots-Sabato"><button class="slot-btn" data-day="Sabato">Mattina</button><button class="slot-btn" data-day="Sabato">Pomeriggio</button><button class="slot-btn" data-day="Sabato">Sera</button></div></div>
            <div class="day-group"><button class="day-toggle" id="btn-Domenica">Domenica</button><div class="time-slots" id="slots-Domenica"><button class="slot-btn" data-day="Domenica">Mattina</button><button class="slot-btn" data-day="Domenica">Pomeriggio</button><button class="slot-btn" data-day="Domenica">Sera</button></div></div>
        </div>

        <div class="save-action-area">
            <button id="btn-save-event">Invia disponibilità</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
