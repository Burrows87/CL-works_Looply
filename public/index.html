<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looply - Organizza il tuo weekend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <div id="login-screen" class="screen">
            <h1>Looply</h1>
            <p>Organizza il tuo weekend con gli amici</p>
            <button id="btn-google-login">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                Accedi con Google
            </button>
        </div>

        <div id="dashboard-screen" class="screen" style="display: none;">
            <header>
                <h2>Ciao, <span id="user-display-name">...</span>!</h2>
                <button id="btn-logout" class="secondary">Esci</button>
            </header>
            <main>
                <div class="card">
                    <h3>I tuoi Weekend</h3>
                    <p>Non hai ancora organizzato nulla. Inizia ora!</p>
                    <button class="primary">+ Crea nuovo evento</button>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
