<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looply - Organizza il tuo weekend</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        /* --- STILE MODERNIZZATO LOOPLY --- */
        .availability-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-group {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
        }

        .screen { 
            transition: opacity 0.3s ease; 
        }
        
        .screen[style*="display: none"] {
            pointer-events: none;
            user-select: none;
        }

        .day-toggle {
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #555;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-toggle::after {
            content: '+';
            font-size: 1.2rem;
            color: #ccc;
        }

        .day-toggle.active {
            background: #e8f0fe;
            border-color: #4285F4;
            color: #4285F4;
            margin-bottom: 10px;
        }

        .day-toggle.active::after {
            content: '−';
            color: #4285F4;
        }

        .time-slots { 
            display: none; 
            gap: 10px; 
            padding: 5px 10px 15px 10px;
            flex-wrap: wrap;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slot-btn {
            padding: 10px 18px !important;
            font-size: 0.85rem !important;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
            flex-grow: 1;
            text-align: center;
            font-weight: 500;
            width: auto;
        }

        .slot-btn.selected {
            background-color: #4285F4 !important;
            color: white !important;
            border-color: #4285F4;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
        }

        .check-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.85rem;
            color: #666;
        }

        h3 { margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="login-screen" class="screen">
            <h1>Looply <span style="font-weight: normal;">🤙🏻</span></h1>
            <p>Organizza il tuo weekend con gli amici</p>
            
            <div id="privacy-container" style="margin: 20px 0;">
                <label class="check-label">
                    <input type="checkbox" id="check-terms">
                    <span>Accetto i <a href="#">Termini di Servizio</a></span>
                </label>
                <label class="check-label">
                    <input type="checkbox" id="check-privacy">
                    <span>Ho letto la <a href="#">Privacy Policy</a></span>
                </label>
            </div>

            <button id="btn-google-login" type="button" disabled>
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="20">
                Accedi con Google
            </button>
        </div>
            
        <div id="dashboard-screen" class="screen" style="display: none;">
            <header>
                <h2>Ciao, <span id="user-display-name">...</span>!</h2>
                <button id="btn-logout" class="secondary" type="button">Esci</button>
            </header>
            
            <main>
                <div id="create-event-section" class="card">
                    <h3>Quando ci sei?</h3>
                    <p class="subtitle">Tocca un giorno per scegliere l'orario</p>
                    
                    <div class="availability-container">
                        <div class="day-group">
                            <button type="button" class="day-toggle" id="btn-venerdi">Venerdì</button>  
                            <div class="time-slots" id="slots-venerdi">
                                <button type="button" class="slot-btn" data-day="Venerdì">Mattina</button>
                                <button type="button" class="slot-btn" data-day="Venerdì">Pomeriggio</button>
                                <button type="button" class="slot-btn" data-day="Venerdì">Sera</button>
                            </div>
                        </div>

                        <div class="day-group">
                            <button type="button" class="day-toggle" id="btn-sabato">Sabato</button>
                            <div class="time-slots" id="slots-sabato">
                                <button type="button" class="slot-btn" data-day="Sabato">Mattina</button>
                                <button type="button" class="slot-btn" data-day="Sabato">Pomeriggio</button>
                                <button type="button" class="slot-btn" data-day="Sabato">Sera</button>
                            </div>
                        </div>

                        <div class="day-group">
                            <button type="button" class="day-toggle" id="btn-domenica">Domenica</button>  
                            <div class="time-slots" id="slots-domenica">
                                <button type="button" class="slot-btn" data-day="Domenica">Mattina</button>
                                <button type="button" class="slot-btn" data-day="Domenica">Pomeriggio</button>
                                <button type="button" class="slot-btn" data-day="Domenica">Sera</button>
                            </div>
                        </div>
                    </div>

                    <button id="btn-save-event" class="primary" style="margin-top: 20px; width: 100%;" type="button">
                        Invia Disponibilità
                    </button>
                </div>
            </main>

            <footer>
                <p style="font-size: 0.8rem; margin-top: 2.5rem; color: #999; border-top: 1px solid #eee; padding-top: 1rem; text-align: center;">
                    Un progetto di <strong>CL Works</strong>
                </p>
            </footer>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
