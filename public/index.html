<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looply - Organizza il tuo weekend</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <div id="app-container">
        <div id="login-screen" class="screen">
            <h1>Looply</h1>
            <p>Organizza il tuo weekend con gli amici</p>
            <button id="btn-google-login">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                Accedi con Google
            </button>
        </div>

        <div id="dashboard-screen" class="screen" style="display: none;">
            <header>
                <h2>Ciao, <span id="user-display-name">...</span>!</h2>
                <button id="btn-logout" class="secondary">Esci</button>
            </header>
            
            <main>
    <div id="create-event-section" class="card">
        <h3>Organizza un nuovo Weekend</h3>
        <input type="text" id="event-title" placeholder="Nome evento (es. Pizza e Birra)">
        
        <div class="days-selector">
            <label><input type="checkbox" class="day-check" value="venerdi"> Venerdì</label>
            <label><input type="checkbox" class="day-check" value="sabato"> Sabato</label>
            <label><input type="checkbox" class="day-check" value="domenica"> Domenica</label>
        </div>

        <button id="btn-save-event" class="primary">Salva Evento</button>
    </div>

    <div id="events-list">
        </div>
</main>
                <div class="card">
                    <h3>I tuoi Weekend</h3>
                    <p>Non hai ancora organizzato nulla. Inizia ora!</p>
                    <button class="primary">+ Crea nuovo evento</button>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
