<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looply - Organizza il tuo weekend</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <div id="app-container">
        <div id="login-screen" class="screen">
            <h1>Looply</h1>
            <p>Organizza il tuo weekend con gli amici</p>
            <button id="btn-google-login">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="20">
                Accedi con Google
            </button>
        </div>

        <div id="dashboard-screen" class="screen" style="display: none;">
            <header>
                <h2>Ciao, <span id="user-display-name">...</span>!</h2>
                <button id="btn-logout" class="secondary">Esci</button>
            </header>
            
            <main>
                <div id="create-event-section" class="card">
                    <h3>Nuovo Weekend</h3>
                    <input type="text" id="event-title" placeholder="Nome (es. Lago di Como)">
                    
                    <div class="days-selector">
                        <input type="checkbox" id="ven" class="day-check" value="venerdi">
                        <label for="ven">Ven</label>

                        <input type="checkbox" id="sab" class="day-check" value="sabato">
                        <label for="sab">Sab</label>

                        <input type="checkbox" id="dom" class="day-check" value="domenica">
                        <label for="dom">Dom</label>
                    </div>

                    <button id="btn-save-event" class="primary">Salva Evento</button>
                </div>

                <div id="events-list-container" class="card" style="margin-top: 2rem;">
                    <h3>I tuoi Weekend</h3>
                    <div id="events-list">
                        <p>Caricamento eventi...</p>
                    </div>
                </div>
            </main>

            <footer>
                <p style="font-size: 0.8rem; margin-top: 2.5rem; color: #999; border-top: 1px solid #eee; padding-top: 1rem; text-align: center;">
                    Un progetto di <strong>CL Works</strong>
                </p>
            </footer>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
