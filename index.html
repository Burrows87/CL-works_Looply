<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Looply - Organizza il Weekend</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: #1e293b; line-height: 1.5; }

        /* SCHERMATA LOGIN */
        #formLogin { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; padding: 20px; text-align: center;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px;
        }
        h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 8px; color: var(--primary-color); }
        
        #googleBtn {
            width: 100%; padding: 16px; margin-top: 24px; border: 1px solid #e2e8f0;
            background: white; border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.2s; position: relative; z-index: 999;
        }
        #googleBtn:active { transform: scale(0.98); background: #f1f5f9; }

        /* APP PRINCIPALE (Nascosta all'inizio) */
        #app { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .user-badge { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-badge img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-color); }

        /* GIORNI E SLOT */
        .day-container { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .day-header { display: flex; justify-content: space-between; align-items: center; }
        .day-btn { 
            padding: 10px 20px; border-radius: 10px; border: 2px solid #e2e8f0; 
            background: none; font-weight: 600; cursor: pointer; 
        }
        .day-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        
        .slots { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .slots.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .slot-chip { 
            display: flex; align-items: center; gap: 8px; padding: 12px; 
            background: #f1f5f9; border-radius: 10px; cursor: pointer; font-size: 0.9rem;
        }

        /* AZIONI */
        .main-btn {
            width: 100%; padding: 18px; background: var(--primary-color); color: white;
            border: none; border-radius: 16px; font-weight: 700; font-size: 1.1rem;
            margin-top: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* MODALI */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        
        /* SETTINGS */
        #settingsPage { display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="formLogin">
        <div class="login-card">
            <h1>Looply</h1>
            <p>Organizza il tuo weekend con gli amici</p>
            <button id="googleBtn" onclick="window.startLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Accedi con Google
            </button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <h2 id="welcomeTitle">Ciao! 🤙🏻</h2>
            <div class="user-badge" onclick="window.openSettings()">
                <img id="userPhoto" src="" alt="Profile">
            </div>
        </div>

        <div id="calendar">
            <div class="day-container">
                <div class="day-header">
                    <span id="labelVen" style="font-weight: 600;">Venerdì</span>
                    <button class="day-btn" id="btnVen" data-day="venerdi">Ven</button>
                </div>
                <div id="venerdi-slots" class="slots disabled">
                    <label class="slot-chip"><input type="checkbox" value="Sempre"> <span class="txtAlways">Sempre</span></label>
                    <label class="slot-chip"><input type="checkbox" value="Sera"> <span class="txtEvening">Sera</span></label>
                </div>
            </div>

            <div class="day-container">
                <div class="day-header">
                    <span id="labelSab" style="font-weight: 600;">Sabato</span>
                    <button class="day-btn" id="btnSab" data-day="sabato">Sab</button>
                </div>
                <div id="sabato-slots" class="slots disabled">
                    <label class="slot-chip"><input type="checkbox" value="Mattina"> <span class="txtMorning">Mattina</span></label>
                    <label class="slot-chip"><input type="checkbox" value="Pomeriggio"> <span class="txtAfternoon">Pom.</span></label>
                    <label class="slot-chip"><input type="checkbox" value="Sera"> <span class="txtEvening">Sera</span></label>
                </div>
            </div>

                <div class="day-header">
                    <span id="labelDom" style="font-weight: 600;">Domenica</span>
