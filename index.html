<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Looply</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="formLogin" class="container">
  <h2>Login</h2>

  <input id="username" placeholder="Nome">
  <input id="phone" placeholder="Telefono (es. 393...)">

  <label><input type="checkbox" id="terms"> Termini</label>
  <label><input type="checkbox" id="privacy"> Privacy</label>

  <button id="enterBtn" onclick="login()" disabled>Entra</button>
</div>

<!-- APP -->
<div id="app" class="hidden container">

  <div class="card">
    <h2>Quando sei disponibile?</h2>
    <div id="daysContainer" class="days-grid"></div>

    <button onclick="saveAvailability()">Salva</button>
  </div>

</div>

<!-- MATCH POPUP -->
<div id="matchPopup" class="hidden card match-popup">
  <h3>🎉 Match trovato!</h3>
  <p id="matchText"></p>
  <div id="matchSuggestions"></div>

  <button onclick="sendWhatsApp()">💬 WhatsApp</button>
  <button onclick="closeMatch()">Chiudi</button>
</div>

<script src="app.js"></script>
</body>
</html>
