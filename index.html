<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Looply</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="formLogin" class="container">
  <h2>Login</h2>

  <input id="username" placeholder="Nome">
  <input id="phone" placeholder="Telefono (es. 393...)">

  <label><input type="checkbox" id="terms"> Termini</label>
  <label><input type="checkbox" id="privacy"> Privacy</label>

  <button id="enterBtn" onclick="login()" disabled>Entra</button>
</div>

<!-- APP -->
<div id="app" class="hidden container">

  <h2>Disponibilità</h2>

  <div id="daysContainer"></div>

  <button onclick="saveAvailability()">Salva</button>

</div>

<!-- MATCH POPUP -->
<div id="matchPopup" class="hidden">
  <h3>🎉 Match trovato!</h3>
  <p id="matchText"></p>

  <button onclick="sendWhatsApp()">WhatsApp</button>
  <button onclick="closeMatch()">Chiudi</button>
</div>

<script src="app.js"></script>

</body>
</html>
