<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Looply</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="formLogin" class="container">

  <div class="header">
    <h1>Looply</h1>
    <p>Trova amici quando siete liberi</p>
  </div>

  <div class="card">
    <input id="username" placeholder="Nome">
    <input id="phone" placeholder="Telefono (es. 393...)">

<label>
  <input type="checkbox" id="rememberMe"> Ricordami
</label>
    
    <label>
      <input type="checkbox" id="terms"> Accetto i termini
    </label>

    <label>
      <input type="checkbox" id="privacy"> Accetto la privacy
    </label>

    <button onclick="login()">Entra</button>
  </div>

</div>

<!-- APP -->
<div id="app" class="hidden container">

  <div class="header">
    <h1>Disponibilità</h1>
    <p>Seleziona i giorni in cui sei libero</p>
  </div>

  <div class="card">

<div class="days-row">

  <!-- VENERDÌ -->
  <div class="day-item">
    <button class="day-btn" data-day="venerdi">Venerdì</button>

    <div id="venerdi-slots" class="slots disabled">
      <label><input type="checkbox" value="mattina"> Mattina</label>
      <label><input type="checkbox" value="pomeriggio"> Pomeriggio</label>
      <label><input type="checkbox" value="sera"> Sera</label>
    </div>
  </div>

  <!-- SABATO -->
  <div class="day-item">
    <button class="day-btn" data-day="sabato">Sabato</button>

    <div id="sabato-slots" class="slots disabled">
      <label><input type="checkbox" value="mattina"> Mattina</label>
      <label><input type="checkbox" value="pomeriggio"> Pomeriggio</label>
      <label><input type="checkbox" value="sera"> Sera</label>
    </div>
  </div>

  <!-- DOMENICA -->
  <div class="day-item">
    <button class="day-btn" data-day="domenica">Domenica</button>

    <div id="domenica-slots" class="slots disabled">
      <label><input type="checkbox" value="mattina"> Mattina</label>
      <label><input type="checkbox" value="pomeriggio"> Pomeriggio</label>
      <label><input type="checkbox" value="sera"> Sera</label>
    </div>
  </div>

</div>
    

    </div>

    <button onclick="saveAvailability()">Salva disponibilità</button>

  </div>

</div>

<!-- MATCH POPUP -->
<div id="matchPopup" class="hidden">
  <h3>🎉 Match trovato!</h3>
  <p id="matchText"></p>

  <button onclick="sendWhatsApp()">WhatsApp</button>
  <button onclick="closeMatch()">Chiudi</button>
</div>

<script src="app.js"></script>

</body>
</html>
