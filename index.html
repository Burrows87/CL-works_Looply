<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Looply</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SLIDES -->
<div id="slides" class="full-screen hidden">

  <div class="top-right">
    <button onclick="finishSlides()">Skip</button>
  </div>

  <div id="slideContent">
    <h2 id="slideTitle"></h2>
    <p id="slideText"></p>
  </div>

  <div id="dots"></div>

  <div class="nav">
    <button onclick="prevSlide()">⬅️</button>
    <button onclick="nextSlide()">➡️</button>
  </div>

  <div id="ctaFinal" class="hidden">
    <button onclick="finishSlides()">Entra su Looply 🚀</button>
  </div>

</div>

<!-- LOGIN -->
<div id="formLogin">
  <h2>Login</h2>

  <input id="username" placeholder="Nome">

  <div>
    <label>
      <input type="checkbox" id="terms">
      Accetto Termini
    </label>
  </div>

  <div>
    <label>
      <input type="checkbox" id="privacy">
      Accetto Privacy
    </label>
  </div>

  <button id="enterBtn" onclick="login()" disabled>Entra</button>

  <p>
    <a href="terms.html">Termini</a> |
    <a href="privacy.html">Privacy</a>
  </p>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h2>Disponibilità</h2>

  <div id="days"></div>

  <button onclick="saveAvailability()">Salva</button>

  <hr>

  <button onclick="openSettings()">⚙️ Impostazioni</button>

</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">

  <button onclick="goBack()">⬅️ Back</button>

  <h3>Impostazioni</h3>

  <label>
    <input type="checkbox" id="notifyToggle" onchange="saveSettings()">
    Notifiche attive
  </label>

  <hr>

  <h4>Personalizzazione</h4>

  <label>Tema:</label>
  <select id="themeSelect" onchange="changeTheme()">
    <option value="light">Chiaro</option>
    <option value="dark">Scuro</option>
  </select>

  <br><br>

  <label>Colore principale:</label>
  <input type="color" id="colorPicker" onchange="changeColor()">

</div>

<script src="app.js"></script>
</body>
</html>
