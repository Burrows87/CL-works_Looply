<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Looply</title>
  
<link rel="stylesheet" href="style.css">


<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
  <div id="formLogin" class="container">
  
  <div class="header">
    <h1>Looply</h1>
    <p>Trova amici quando siete liberi</p>
  </div>

  <div class="card">
    <input id="username" placeholder="Nome">
    <input id="phone" placeholder="Telefono (es. 393...)">

    <label><input type="checkbox" id="terms"> Accetto i termini</label>
    <label><input type="checkbox" id="privacy"> Accetto la privacy</label>

    <button id="enterBtn" onclick="login()" disabled>Entra</button>
  </div>

  </div>


<!-- APP -->
  <div id="app" class="hidden container">

  <div class="header">
    <h1>Disponibilità</h1>
    <p>Seleziona i giorni in cui sei libero</p>
  </div>

  <div class="card">
    <div id="daysContainer"></div>

    <div class="days-row">

  <!-- Venerdì -->
  <div class="day-item">
    <button class="day-btn" onclick="toggleDay('venerdi')">Venerdì</button>

    <select id="venerdi-slot" class="slot-select" disabled>
      <option value="">Seleziona fascia (opzionale)</option>
      <option value="mattina">Mattina</option>
      <option value="pomeriggio">Pomeriggio</option>
      <option value="sera">Sera</option>
    </select>
  </div>

  <!-- Sabato -->
  <div class="day-item">
    <button class="day-btn" onclick="toggleDay('sabato')">Sabato</button>

    <select id="sabato-slot" class="slot-select" disabled>
      <option value="">Seleziona fascia (opzionale)</option>
      <option value="mattina">Mattina</option>
      <option value="pomeriggio">Pomeriggio</option>
      <option value="sera">Sera</option>
    </select>
  </div>

  <!-- Domenica -->
  <div class="day-item">
    <button class="day-btn" onclick="toggleDay('domenica')">Domenica</button>

    <select id="domenica-slot" class="slot-select" disabled>
      <option value="">Seleziona fascia (opzionale)</option>
      <option value="mattina">Mattina</option>
      <option value="pomeriggio">Pomeriggio</option>
      <option value="sera">Sera</option>
    </select>
  </div>

    </div>

    <button onclick="saveAvailability()">Salva disponibilità</button>
  </div>

  </div>


<!-- MATCH POPUP -->
<div id="matchPopup" class="hidden">
  <h3>🎉 Match trovato!</h3>
  <p id="matchText"></p>

  <button onclick="sendWhatsApp()">WhatsApp</button>
  <button onclick="closeMatch()">Chiudi</button>
</div>

<script src="app.js"></script>

</body>
</html>
