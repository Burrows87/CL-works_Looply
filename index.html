<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Looply</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Stili di emergenza se style.css non carica */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .header h1 { color: #2563eb; font-size: 32px; margin-bottom: 5px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        .btn-google { background: white; border: 1px solid #ddd; padding: 12px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; font-weight: bold; }
        #app { display: none; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="formLogin">
            <div class="header">
                <h1>Looply</h1>
                <p>Organizza il tuo weekend</p>
            </div>
            <div class="card">
                <button type="button" class="btn-google" onclick="window.startLogin()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G">
                    Accedi con Google
                </button>
            </div>
        </div>

        <div id="app">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
                <h1 id="welcomeTitle">Ciao 🤙🏻</h1>
                <button onclick="window.logout()" style="background:none; border:none; color:#6b7280; font-size: 20px;"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
            <div class="card">
                <p>Siamo dentro! Ora puoi configurare i tuoi giorni.</p>
                </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="app.js?v=3.1"></script>

</body>
</html>
