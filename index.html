<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Looply</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <div id="formLogin">
      <div class="header">
        <h1>Looply</h1>
        <p>Organizza la tua disponibilità</p>
      </div>
      
      <div class="card">
        <button id="googleBtn" style="background: #ffffff; color: #111827; border: 1px solid #e5e7eb;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" style="margin-right: 10px; vertical-align: middle;">
          Accedi con Google
        </button>
        
        <div style="text-align: center; margin: 15px 0; color: #9ca3af; font-size: 12px;">OPPURE</div>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginEmail()">Login / Registrati</button>
      </div>
    </div>

    <div id="app" class="hidden">
      <div class="header">
        <h1>Ciao!</h1>
        <p>Seleziona i giorni in cui sei disponibile</p>
        <button onclick="logout()" style="width: auto; padding: 5px 15px; background: #fee2e2; color: #ef4444; font-size: 12px; margin-top: 5px;">Esci</button>
      </div>

      <div class="card">
        <div class="days-row">
          <div class="day-item">
            <button class="day-btn" data-day="venerdi">Ven</button>
            <div id="venerdi-slots" class="slots disabled">
              <label><input type="checkbox" value="morning"> Mattina</label>
              <label><input type="checkbox" value="afternoon"> Pom.</label>
              <label><input type="checkbox" value="evening"> Sera</label>
            </div>
          </div>

          <div class="day-item">
            <button class="day-btn" data-day="sabato">Sab</button>
            <div id="sabato-slots" class="slots disabled">
              <label><input type="checkbox" value="morning"> Mattina</label>
              <label><input type="checkbox" value="afternoon"> Pom.</label>
              <label><input type="checkbox" value="evening"> Sera</label>
            </div>
          </div>

          <div class="day-item">
            <button class="day-btn" data-day="domenica">Dom</button>
            <div id="domenica-slots" class="slots disabled">
              <label><input type="checkbox" value="morning"> Mattina</label>
              <label><input type="checkbox" value="afternoon"> Pom.</label>
              <label><input type="checkbox" value="evening"> Sera</label>
            </div>
          </div>
        </div>

        <button class="mt-10" onclick="saveAvailability()">Salva disponibilità</button>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="app.js"></script>
</body>
</html>
