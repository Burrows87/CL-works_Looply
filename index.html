<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Looply</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
    .hidden { display: none !important; }
    .active { background-color: #4CAF50 !important; color: white; border-color: #388E3C; }
    .disabled { opacity: 0.4; pointer-events: none; }
    .day-btn { margin: 5px; padding: 12px 20px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; transition: 0.3s; }
    .slots { margin: 15px 0; padding: 15px; border: 1px solid #ddd; background: white; border-radius: 8px; }
    input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button#googleBtn { width: 100%; padding: 12px; cursor: pointer; background: #4285F4; color: white; border: none; border-radius: 4px; font-weight: bold; }
    .save-btn { width: 100%; padding: 15px; background: #2196F3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="formLogin">
    <div style="max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
      <h2 style="text-align: center;">Looply Login</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      
      <div style="font-size: 14px; margin-bottom: 15px;">
        <label><input type="checkbox" id="terms"> Accetto i termini</label><br>
        <label><input type="checkbox" id="privacy"> Accetto la privacy</label>
      </div>

      <button onclick="loginEmail()" style="width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;">Accedi / Registrati</button>
      <div style="text-align: center; margin: 10px 0; color: #666;">oppure</div>
      <button id="googleBtn">Accedi con Google</button>
    </div>
  </div>

  <div id="app" class="hidden" style="max-width: 600px; margin: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Looply</h2>
      <button onclick="logout()" style="padding: 5px 10px; cursor: pointer;">Esci</button>
    </div>
    
    <h3>Seleziona la tua disponibilità</h3>
    <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
      <button class="day-btn" data-day="venerdi">Venerdì</button>
      <button class="day-btn" data-day="sabato">Sabato</button>
      <button class="day-btn" data-day="domenica">Domenica</button>
    </div>

    <div id="venerdi-slots" class="slots disabled">
      <h4>Disponibilità Venerdì</h4>
      <label><input type="checkbox" class="always" value="any" checked> Tutto il giorno</label><br>
      <label><input type="checkbox" value="morning"> Mattina</label><br>
      <label><input type="checkbox" value="afternoon"> Pomeriggio</label><br>
      <label><input type="checkbox" value="evening"> Sera</label>
    </div>

    <div id="sabato-slots" class="slots disabled">
      <h4>Disponibilità Sabato</h4>
      <label><input type="checkbox" class="always" value="any" checked> Tutto il giorno</label><br>
      <label><input type="checkbox" value="morning"> Mattina</label><br>
      <label><input type="checkbox" value="afternoon"> Pomeriggio</label><br>
      <label><input type="checkbox" value="evening"> Sera</label>
    </div>

    <div id="domenica-slots" class="slots disabled">
      <h4>Disponibilità Domenica</h4>
      <label><input type="checkbox" class="always" value="any" checked> Tutto il giorno</label><br>
      <label><input type="checkbox" value="morning"> Mattina</label><br>
      <label><input type="checkbox" value="afternoon"> Pomeriggio</label><br>
      <label><input type="checkbox" value="evening"> Sera</label>
    </div>

    <button class="save-btn" onclick="saveAvailability()">Salva disponibilità</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script src="app.js"></script>
</body>
</html>
