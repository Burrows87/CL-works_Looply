<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Looply</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .hidden { display: none; }
    .active { background-color: #4CAF50; color: white; }
    .disabled { opacity: 0.5; pointer-events: none; }
    .day-btn { margin: 5px; padding: 10px; }
    .slots { margin: 10px 0; }
  </style>
</head>

<body>

  <!-- ================= LOGIN ================= -->
  <div id="formLogin">

    <h2>Login Looply</h2>

    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>

    <input type="text" id="username" placeholder="Nome"><br><br>
    <input type="text" id="phone" placeholder="Telefono"><br><br>

    <label>
      <input type="checkbox" id="terms"> Accetto termini
    </label><br>

    <label>
      <input type="checkbox" id="privacy"> Accetto privacy
    </label><br><br>

    <button id="enterBtn" onclick="login()">Login / Registrati</button>

    <hr>

    <button onclick="loginWithGoogle()">Accedi con Google</button>

  </div>

  <!-- ================= APP ================= -->

    <h3>Seleziona giorni disponibili</h3>

    <button class="day-btn" data-day="sabato">Sabato</button>
    <button class="day-btn" data-day="domenica">Domenica</button>
