<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Looply</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Looply">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        
        <div id="formLogin">
            <div class="header">
                <h1>Looply</h1>
                <p>Organizza il tuo weekend</p>
            </div>
            <div class="card">
                <button id="googleBtn" type="button" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                    Accedi con Google
                </button>
            </div>
        </div>

        <div id="app" style="display: none;">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
                <h1 id="welcomeTitle">Ciao!</h1>
                <i class="fa-solid fa-gear" onclick="window.openSettings()" style="font-size: 24px; cursor: pointer; color: #6b7280; padding: 5px;"></i>
            </div>

            <div class="card">
                <div class="days-row">
                    <div class="day-item"><button class="day-btn" data-day="venerdi">Ven</button></div>
                    <div class="day-item"><button class="day-btn" data-day="sabato">Sab</button></div>
                    <div class="day-item"><button class="day-btn" data-day="domenica">Dom</button></div>
                </div>

                <div id="venerdi-slots" class="slots disabled">
                    <p style="margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--primary-color);">Venerdì</p>
                    <div class="slots-grid">
                        <label><input type="checkbox" value="Sempre"> Sempre</label>
                        <label><input type="checkbox" value="Mattina"> Mattina</label>
                        <label><input type="checkbox" value="Pomeriggio"> Pom.</label>
                        <label><input type="checkbox" value="Sera"> Sera</label>
                    </div>
                </div>

                <div id="sabato-slots" class="slots disabled">
                    <p style="margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--primary-color);">Sabato</p>
                    <div class="slots-grid">
                        <label><input type="checkbox" value="Sempre"> Sempre</label>
                        <label><input type="checkbox" value="Mattina"> Mattina</label>
                        <label><input type="checkbox" value="Pomeriggio"> Pom.</label>
                        <label><input type="checkbox" value="Sera"> Sera</label>
                    </div>
                </div>

                <div id="domenica-slots" class="slots disabled">
                    <p style="margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--primary-color);">Domenica</p>
                    <div class="slots-grid">
                        <label><input type="checkbox" value="Sempre"> Sempre</label>
                        <label><input type="checkbox" value="Mattina"> Mattina</label>
                        <label><input type="checkbox" value="Pomeriggio"> Pom.</label>
                        <label><input type="checkbox" value="Sera"> Sera</label>
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                    <button id="btnSave" onclick="window.saveAvailability()" class="btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Salva disponibilità
                    </button>
                    <button onclick="window.shareWhatsApp()" class="btn-whatsapp">
                        <i class="fa-brands fa-whatsapp"></i> Invia su WhatsApp
                    </button>
                </div>
            </div>
        </div>

        <div id="settingsPage" style="display: none;">
            <div class="header" style="display: flex; align-items: center; gap: 15px; padding: 10px 0;">
                <i class="fa-solid fa-arrow-left" onclick="window.closeSettings()" style="cursor: pointer; font-size: 20px;"></i>
                <h1>Impostazioni</h1>
            </div>
            <div class="card">
                <div style="text-align: center; margin-bottom: 25px;">
                    <img id="userPhoto" src="" style="width: 80px; height: 80px; border-radius: 50%; display: none; margin: 0 auto 10px; border: 3px solid var(--primary-color); object-fit: cover;">
                    <h3 id="userName" style="margin-bottom: 2px;">Utente</h3>
                    <p id="userEmail" style="font-size: 12px; color: gray;"></p>
                </div>

                <div style="border-top: 1px solid #eee; padding-top: 20px;">
                    <p style="font-size: 14px; font-weight: bold; margin-bottom: 15px; text-align: center;">Colore Interfaccia</p>
                    <div class="colors-container">
                        <div class="color-dot" onclick="window.changeTheme('#2563eb')" style="background-color: #2563eb !important;"></div>
                        <div class="color-dot" onclick="window.changeTheme('#059669')" style="background-color: #05966
